<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>正在跳转…</title>
  <!-- 旧书签可能指向本文件名；仅保留跳转，主应用一律使用 index.html -->
  <script>
    (function () {
      if (/\bstay=1\b/.test(location.search || "")) return;
      location.replace(new URL("./index.html", location.href));
    })();
  </script>
</head>
<body>
  <p style="font-family: system-ui, sans-serif; padding: 1rem; line-height: 1.5">
    正在跳转到主应用… 若未自动跳转，请
    <a href="./index.html">打开 index.html</a>。
  </p>
  <p id="stay-note" hidden style="font-family: system-ui, sans-serif; padding: 0 1rem; color: #64748b">
    已使用参数 <code>?stay=1</code>：不自动跳转。请改用
    <a href="./index.html">index.html</a>。
  </p>
  <script>
    if (/\bstay=1\b/.test(location.search || "")) {
      var el = document.getElementById("stay-note");
      if (el) el.hidden = false;
    }
  </script>
</body>
</html>
